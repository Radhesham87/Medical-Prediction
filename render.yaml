services:
  - type: web
    name: medpredict-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        value: https://medical-prediction-seven.vercel.app
      - key: FIRST_ADMIN_EMAIL
        value: admin@medpredict.local
      - key: FIRST_ADMIN_PASSWORD
        sync: false
      - key: DATASET_PATH
        value: /opt/render/project/src/data/All_Medical_College_Last_Cutoff.xlsx