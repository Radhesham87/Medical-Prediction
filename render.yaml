# Render Blueprint — deploys the FastAPI backend + a free PostgreSQL instance.
# Frontend deploys separately on Vercel (see README).
databases:
  - name: medpredict-db
    plan: free
    databaseName: medpredict
    user: medpredict

services:
  - type: web
    name: medpredict-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medpredict-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # Set this to your deployed Vercel URL after the frontend is live.
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: FIRST_ADMIN_EMAIL
        value: admin@medpredict.local
      - key: FIRST_ADMIN_PASSWORD
        sync: false
      - key: DATASET_PATH
        value: /opt/render/project/src/data/All_Medical_College_Last_Cutoff.xlsx
