services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medpredict
      POSTGRES_PASSWORD: medpredict
      POSTGRES_DB: medpredict
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medpredict"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medpredict:medpredict@db:5432/medpredict
      SECRET_KEY: local-dev-secret-change-me
      CORS_ORIGINS: http://localhost:3000
      FIRST_ADMIN_EMAIL: admin@medpredict.local
      FIRST_ADMIN_PASSWORD: Admin@12345
      DATASET_PATH: /data/All_Medical_College_Last_Cutoff.xlsx
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  pgdata:
